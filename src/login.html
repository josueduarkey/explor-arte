<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-orange": "#FF7F32",
            "primary-green": "#2ECC71",
            "primary-teal": "#117899",
            "custom-bg": "#FFFDF5",
            "custom-text": "#333333",
          },
          fontFamily: {
            "display": ["Lexend", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <title>Login (Actualizado)</title>
  <style>
    body {
      min-height: max(884px, 100dvh);
      background-color: #FFFDF5;
      color: #333333;
    }
  </style>
</head>

<body class="font-display bg-custom-bg text-custom-text min-h-screen flex flex-col items-center">
  <!-- Top Navigation Bar -->
  <header class="w-full max-w-[480px] flex items-center justify-between p-4 sticky top-0 z-10 bg-custom-bg">
    <h1 class="text-xl font-black tracking-tight flex-1 text-center uppercase" style="">ExplorArte</h1>
    <div class="flex items-center justify-end size-12">
      <button class="hover:scale-110 transition-transform p-2 rounded-full bg-black/5"
        style="color: rgb(51, 51, 51);"><span class="material-symbols-outlined" data-icon="refresh"
          style="">refresh</span></button>
    </div>
  </header>
  <!-- Main Content -->
  <main class="flex-1 w-full max-w-[480px] flex flex-col px-6 py-6 gap-6 items-center justify-center">
    <!-- Welcome Message -->
    <div class="text-center space-y-2">
      <h2 class="text-4xl font-black leading-tight tracking-tight" style="">
        ¡Hola, Bienvenido/a!
      </h2>
      <p class="text-xl font-semibold opacity-80" style="">
        ¿Cómo quieres ingresar hoy?
      </p>
    </div>
    <!-- Role Selection Buttons -->
    <div class="flex flex-col w-full gap-4"><!-- Admin/Trainer Button (Dark Blue) -->
      <button
        class="group flex flex-col items-center justify-center w-full gap-3 p-6 bg-[#000080] hover:brightness-110 text-white rounded-2xl shadow-xl shadow-[#000080]/20 transition-all border-b-4 border-black/20 active:border-b-0 active:translate-y-1"
        style="">
        <div class="bg-white/20 p-3 rounded-full">
          <span class="material-symbols-outlined text-5xl" data-icon="settings" style="">settings</span>
        </div>
        <div class="text-center">
          <span class="text-2xl font-black tracking-wider uppercase block leading-none" style="">Soy
            Administrador</span>
          <span class="text-sm font-bold opacity-90 uppercase mt-1 block" style="">/ CAPACITADOR</span>
        </div>
      </button>
      <!-- Teacher Button (Navy Blue) -->
      <button
        class="group flex flex-col items-center justify-center w-full gap-3 p-6 bg-[#007BFF] hover:brightness-110 text-white rounded-2xl shadow-xl shadow-[#007BFF]/20 transition-all border-b-4 border-black/20 active:border-b-0 active:translate-y-1"
        style="">
        <div class="bg-white/20 p-3 rounded-full">
          <span class="material-symbols-outlined text-5xl" data-icon="school" style="">school</span>
        </div>
        <div class="text-center">
          <span class="text-2xl font-black tracking-wider uppercase block" style="">Soy Docente</span>
        </div>
      </button>
      <!-- Student Button (Standard Blue) -->
      <button
        class="group flex flex-col items-center justify-center w-full gap-3 p-6 bg-[#5DADE2] hover:brightness-110 text-white rounded-2xl shadow-xl shadow-[#5DADE2]/20 transition-all border-b-4 border-black/20 active:border-b-0 active:translate-y-1"
        style="">
        <div class="bg-white/20 p-3 rounded-full">
          <span class="material-symbols-outlined text-5xl" data-icon="menu_book" style="">menu_book</span>
        </div>
        <div class="text-center">
          <span class="text-2xl font-black tracking-wider uppercase block" style="">Soy Estudiante</span>
          <span class="text-sm font-bold opacity-90 block mt-1" style="">Solo para ver mis libros en PDF</span>
        </div>
      </button>
    </div>
    <!-- Illustration or Decorative Element -->
    <div class="mt-2 opacity-10 flex gap-6">
      <span class="material-symbols-outlined text-5xl" style="">draw</span>
      <span class="material-symbols-outlined text-5xl" style="">auto_stories</span>
      <span class="material-symbols-outlined text-5xl" style="">theater_comedy</span>
    </div>
  </main>
  <!-- Footer -->
  <footer class="w-full max-w-[480px] p-6 text-center">
    <button
      class="text-custom-text font-black text-base underline underline-offset-4 decoration-primary-orange/50 flex items-center justify-center gap-2 w-full py-4 hover:text-primary-orange transition-colors"
      style="">
      <span class="material-symbols-outlined text-xl" style="">help</span>
      ¿Problemas para ingresar? Contacto
    </button>
    <!-- Bottom spacing for mobile safe areas -->
    <div class="h-6"></div>
  </footer>
</body>

</html>
