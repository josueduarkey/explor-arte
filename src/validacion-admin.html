<!DOCTYPE html>

<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#000080",
            "modal-bg": "#FFFDF5",
            "text-main": "#333333",
            "teal-accent": "#117899",
            "background-light": "#f8f7f5",
            "background-dark": "#221910",
          },
          fontFamily: {
            "display": ["Lexend", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body
  class="font-display bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 overflow-hidden">
  <!-- Background Overlay (Simulating the blocked background) -->
  <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-0"></div>
  <!-- Modal Container -->
  <div class="relative z-10 w-full max-w-sm bg-modal-bg rounded-xl shadow-2xl flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="pt-8 px-6 text-center">
      <div class="mx-auto w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center mb-4">
        <span class="material-symbols-outlined text-primary text-3xl">lock</span>
      </div>
      <h2 class="text-text-main text-2xl font-bold leading-tight">Acceso de Seguridad</h2>
      <p class="text-text-main/70 text-sm font-normal mt-2">Por favor, ingresa tu código de 6 dígitos para agregar nuevo
        material.</p>
    </div>
    <!-- Code Input Group -->
    <div class="flex justify-center gap-2 px-6 py-8">
      <input
        class="w-10 h-14 text-center text-xl font-bold border-b-2 border-teal-accent bg-transparent focus:border-primary focus:ring-0 text-text-main"
        maxlength="1" type="text" value="8" />
      <input
        class="w-10 h-14 text-center text-xl font-bold border-b-2 border-teal-accent bg-transparent focus:border-primary focus:ring-0 text-text-main"
        maxlength="1" type="text" value="4" />
      <input
        class="w-10 h-14 text-center text-xl font-bold border-b-2 border-teal-accent bg-transparent focus:border-primary focus:ring-0 text-text-main"
        maxlength="1" placeholder="·" type="text" />
      <input
        class="w-10 h-14 text-center text-xl font-bold border-b-2 border-teal-accent bg-transparent focus:border-primary focus:ring-0 text-text-main"
        maxlength="1" placeholder="·" type="text" />
      <input
        class="w-10 h-14 text-center text-xl font-bold border-b-2 border-teal-accent bg-transparent focus:border-primary focus:ring-0 text-text-main"
        maxlength="1" placeholder="·" type="text" />
      <input
        class="w-10 h-14 text-center text-xl font-bold border-b-2 border-teal-accent bg-transparent focus:border-primary focus:ring-0 text-text-main"
        maxlength="1" placeholder="·" type="text" />
    </div>
    <!-- Integrated Numpad -->
    <div class="bg-black/5 p-4 grid grid-cols-3 gap-2">
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">1</button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">2</button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">3</button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">4</button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">5</button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">6</button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">7</button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">8</button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">9</button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg"></button>
      <button
        class="h-14 flex items-center justify-center text-xl font-semibold text-text-main hover:bg-black/10 rounded-lg">0</button>
      <button class="h-14 flex items-center justify-center text-text-main hover:bg-black/10 rounded-lg">
        <span class="material-symbols-outlined">backspace</span>
      </button>
    </div>
    <!-- Action Buttons -->
    <div class="p-6 space-y-3">
      <button
        class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-transform">
        VALIDAR CÓDIGO
      </button>
      <button class="w-full text-text-main/60 font-medium py-2 hover:text-text-main transition-colors">
        Cancelar
      </button>
    </div>
  </div>
</body>

</html>
